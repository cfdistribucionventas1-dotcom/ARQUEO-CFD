  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0f1117; }
    #root { height: 100%; }

    /* Splash de carga */
    #splash {
      position: fixed; inset: 0; background: #1a3a6b; z-index:9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-hex {
      font-size: 64px; margin-bottom: 20px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .splash-title {
      font-family: sans-serif; font-weight: 900; font-size: 22px;
      letter-spacing: 3px; text-transform: uppercase; color: #ffffff;
    }
    .splash-sub {
      font-family: sans-serif; font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,0.65); margin-top: 8px;
    }
    .splash-dots { display: flex; gap: 8px; margin-top: 32px; }
    .splash-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #ffffff;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-8px);opacity:1} }

    /* Banner instalacion */
    #install-banner {
      position: fixed; bottom: 96px; left: 12px; right: 12px;
      background: #ffffff; border: 1.5px solid #1a3a6b;
      border-radius: 12px; padding: 14px 16px;
      display: none; align-items: center; gap: 12px;
      z-index: 500; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #install-banner.show { display: flex; }
    #install-banner-text { flex: 1; }
    #install-banner-title {
      font-family: sans-serif; font-weight: 700; font-size: 13px;
      color: #e8e4dc; letter-spacing: 0.5px;
    }
    #install-banner-sub {
      font-family: sans-serif; font-size: 11px; color: #8890a8; margin-top: 2px;
    }
    #install-btn {
      background: #1a3a6b; color: #ffffff; border: none;
      border-radius: 8px; padding: 8px 16px; cursor: pointer;
      font-family: sans-serif; font-weight: 800; font-size: 12px;
      letter-spacing: 1px; white-space: nowrap;
    }
    #install-dismiss {
      background: none; border: none; color: #8890a8;
      cursor: pointer; font-size: 18px; padding: 0 4px;
    }

    /* Banner actualización */
    #update-banner {
      position: fixed; top: 0; left: 0; right: 0;
      background: #1a3a6b; color: #ffffff;
      padding: 10px 16px; text-align: center;
      display: none; align-items: center; justify-content: center; gap: 12px;
      z-index: 600; font-family: sans-serif; font-size: 13px; font-weight: 700;
    }
    #update-banner.show { display: flex; }
    #update-btn {
      background: #ffffff; color: #1a3a6b; border: none;
      border-radius: 6px; padding: 4px 12px; cursor: pointer;
      font-weight: 800; font-size: 12px;
    }

    /* Safe area iOS */
    .app { padding-bottom: calc(90px + env(safe-area-inset-bottom)); }
    .resumen-bar { padding-bottom: calc(9px + env(safe-area-inset-bottom)); }
  </style>
</head>

<!-- Splash -->

  </div>
  <button id="install-btn">INSTALAR</button>

</div>

.resumen-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;}
.resumen-val.positive{color:var(--green);}
.resumen-val.negative{color:var(--red);}
.resumen-val.neutral{color:#ffffff;}
.resumen-val.blue{color:rgba(255,255,255,0.9);}
.resumen-val.orange{color:rgba(255,255,255,0.9);}
@media(max-width:520px){
  .comp-fields,.apertura-fields{grid-template-columns:1fr;}
  .cuadre-tres{grid-template-columns:1fr;}
  .header-logo{font-size:19px;}
  .cuadre-resultado-diferencia{font-size:38px;}
  .cuadre-apertura-banner{flex-direction:column;gap:10px;text-align:center;}
}

function Arqueo() {
  const [tab, setTab] = React.useState(0);

  const [envioOk,   setEnvioOk]        = React.useState(false);

  const [apertura, setApertura] = React.useState({
    distribuidor: "", ruta: "", fecha: todayISO(), montoInicial: "",
  });
  const [cantBilletes, setCantBilletes] = React.useState(
    Object.fromEntries(BILLETES.map(b => [b.valor, ""]))
  );
  const [cantMonedas, setCantMonedas] = React.useState(
    Object.fromEntries(MONEDAS.map(m => [m.valor, ""]))
  );
  const [comprobantes, setComprobantes] = React.useState([]);
  const [gastos,       setGastos]       = React.useState([]);

  React.useEffect(() => {

    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload = () => setJspdfLoaded(true);
    document.head.appendChild(s);

  // Calculos
  const montoInicial  = parseFloat(apertura.montoInicial) || 0;
  const totalBilletes = BILLETES.reduce((s,b)=>s+(parseFloat(cantBilletes[b.valor])||0)*b.valor,0);
  const totalMonedas  = MONEDAS.reduce((s,m)=>s+(parseFloat(cantMonedas[m.valor])||0)*m.valor,0);
  const totalEfectivo = totalBilletes + totalMonedas;
  const totalTransf   = comprobantes.reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  const totalGastos   = gastos.reduce((s,g)=>s+(parseFloat(g.monto)||0),0);
  const totalRendido  = totalEfectivo + totalTransf + totalGastos;
  const diferencia    = totalRendido - montoInicial;
  const pct = (v) => montoInicial > 0 ? Math.min(100,(v/montoInicial)*100) : 0;
  const cuadreClass = diferencia === 0 ? "exacto" : diferencia > 0 ? "sobrante" : "faltante";
  const cuadreLabel = diferencia === 0 ? "Cuadre exacto" : diferencia > 0 ? "Sobrante" : "Faltante";

  const enviarArqueo = async () => {
    if (!SHEETS_URL) {
      alert("Para enviar a Google Sheets, pegá la URL del Apps Script en la constante SHEETS_URL del archivo index.html.");
      return;
    }
    if (!apertura.distribuidor) {
      alert("Completá el nombre del distribuidor antes de enviar.");
      return;
    }
    setEnviando(true);
    try {
      const payload = {
        fecha: apertura.fecha,
        distribuidor: apertura.distribuidor,
        montoInicial,
        totalEfectivo,
        totalTransferencias: totalTransf,
        totalGastos,
        totalRendido,
        comprobantes: comprobantes.map(c => ({
          tipo: c.tipo, cliente: c.cliente,
          referencia: c.referencia, monto: c.monto
        })),
        gastos: gastos.map(g => ({
          categoria: g.categoria, descripcion: g.descripcion, monto: g.monto
        }))
      };
      const res = await fetch(SHEETS_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if (json.ok) {
        setEnvioOk(true);
        setTimeout(() => setEnvioOk(false), 4000);
      } else {
        alert("Error al enviar: " + (json.error || "desconocido"));
      }
    } catch(err) {
      alert("No se pudo conectar con Google Sheets. Verificá la URL del script.");
    }
    setEnviando(false);
  };

      sT("1. Datos de Apertura");
      row("Distribuidor",apertura.distribuidor||"—"); row("Fecha",apertura.fecha); div(); bigRow("Monto Asignado de Apertura",montoInicial,C.gold); y+=4;

      sT("2. Efectivo Cobrado");
      let hB=false; BILLETES.forEach(b=>{ const q=parseFloat(cantBilletes[b.valor])||0; if(q>0){row(`${b.label}`,`${q} x ${b.label} = Bs. ${fmt(q*b.valor)}`);hB=true;} }); if(!hB) row("Sin billetes","—");
      let hM=false; MONEDAS.forEach(m=>{ const q=parseFloat(cantMonedas[m.valor])||0; if(q>0){row(`${m.label}`,`${q} x ${m.label} = Bs. ${fmt(q*m.valor)}`);hM=true;} }); if(!hM) row("Sin monedas","—");
      div(); bigRow("Total Efectivo",totalEfectivo,C.blue); y+=4;

      sT("3. Cobros por Transferencia / QR");
      if(comprobantes.length===0){ row("Sin comprobantes","—"); }
      else { comprobantes.forEach((c,i)=>{ checkY(20); doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(...C.gold); doc.text(`#${i+1}  ${c.tipo}`,mg+4,y); y+=6; row("Cliente",c.cliente||"—"); row("Referencia",c.referencia||"—"); row("Monto",`Bs. ${fmt(parseFloat(c.monto)||0)}`,C.green); y+=2; }); }
      div(); bigRow("Total Transferencias",totalTransf,C.green); y+=4;

      sT("4. Gastos del Dia");
      if(gastos.length===0){ row("Sin gastos","—"); }
      else { gastos.forEach((g,i)=>row(`${i+1}. ${g.categoria}${g.descripcion?" - "+g.descripcion:""}`,`Bs. ${fmt(parseFloat(g.monto)||0)}`,C.orange)); }
      div(); bigRow("Total Gastos",totalGastos,C.orange); y+=4;

      // Fotos
      const conFoto=comprobantes.filter(c=>c.foto);
      if(conFoto.length>0){
        newPage(); sT("3B. Fotografias de Comprobantes");
        for(let i=0;i<conFoto.length;i++){
          const c=conFoto[i]; const idx=comprobantes.indexOf(c)+1; checkY(75);
          doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(...C.gold);
          doc.text(`Comprobante #${idx} - ${c.tipo}  |  ${c.cliente||"Sin nombre"}  |  Bs. ${fmt(parseFloat(c.monto)||0)}`,mg,y); y+=5;
          const imgFmt=c.foto.includes("data:image/jpeg")||c.foto.includes("data:image/jpg")?"JPEG":"PNG";
          try{
            const img=new Image(); await new Promise(res=>{img.onload=res;img.src=c.foto;});
            const ratio=img.naturalWidth/img.naturalHeight; let iW=W-mg*2,iH=iW/ratio; if(iH>72){iH=72;iW=72*ratio;}
            checkY(iH+10); doc.setDrawColor(...C.gold); doc.roundedRect(mg-1,y-1,iW+2,iH+2,2,2,"S");
            doc.addImage(c.foto,imgFmt,mg,y,iW,iH); y+=iH+10;
          }catch{ row("(Error al cargar imagen)","—"); }
        }
      }

      // Cuadre
      checkY(80); sT("5. Cuadre de Caja");
      row("Monto de Apertura asignado",`Bs. ${fmt(montoInicial)}`,C.gold);
      div();
      row("Efectivo cobrado",`Bs. ${fmt(totalEfectivo)}`,C.blue);
      row("Transferencias / QR",`Bs. ${fmt(totalTransf)}`,C.green);
      row("Gastos documentados",`Bs. ${fmt(totalGastos)}`,C.orange);
      div(); bigRow("Total Rendido  (ef. + transf. + gastos)",totalRendido); y+=2;
      checkY(20);
      doc.setFillColor(...C.dark); doc.rect(mg,y,W-mg*2,18,"F");
      const dC=diferencia===0?C.green:diferencia>0?C.blue:C.red;
      doc.setFillColor(...dC); doc.rect(mg,y,3,18,"F");
      doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(...C.white);
      doc.text(diferencia===0?"CUADRE EXACTO":diferencia>0?"SOBRANTE":"FALTANTE",mg+8,y+11);
      doc.setTextColor(...dC); doc.setFontSize(15);
      doc.text(`Bs. ${fmt(Math.abs(diferencia))}`,W-mg-5,y+11,{align:"right"}); y+=24;
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(...C.gray);
      const st=diferencia===0?"El distribuidor rindio exactamente el monto asignado.":diferencia>0?`Rindio Bs. ${fmt(diferencia)} por encima del monto asignado.`:`Rindio Bs. ${fmt(Math.abs(diferencia))} por debajo del monto asignado.`;
      doc.text(st,W/2,y,{align:"center"}); y+=14;
      div();
      doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(...C.gray);
      doc.line(mg+18,y+16,mg+78,y+16); doc.text("Firma Distribuidor",mg+48,y+22,{align:"center"});
      doc.line(W-mg-78,y+16,W-mg-18,y+16); doc.text("Firma Supervisor",W-mg-48,y+22,{align:"center"}); y+=34;
      doc.setFontSize(7); doc.text("Documento generado automaticamente - CFDistribucion S.R.L. — Sistema de Arqueo de Caja",W/2,y,{align:"center"});

      doc.save(`Arqueo_${(apertura.distribuidor||"Distribuidor").replace(/\s+/g,"_")}_${apertura.fecha}.pdf`);
    } catch(err){ console.error(err); alert("Error al generar el PDF. Intenta de nuevo."); }
    setGenerando(false);
  };

  return (
    <>
      <style>{css}</style>
      <div className="app">

              <div className="header-sub">Arqueo de Caja — Distribuidor</div>

              <div className="header-date">{todayStr()}</div>
              <div className="header-total">Bs. {fmt(montoInicial)}</div>
            </div>
          </div>
        </div>

        <div className="tabs">
          {[{icon:"🚀",label:"Apertura"},{icon:"💵",label:"Efectivo"},{icon:"📲",label:"Pagos"},{icon:"🧾",label:"Gastos"},{icon:"⚖️",label:"Cuadre"}].map((t,i)=>(
            <button key={i} className={`tab${tab===i?" active":""}`} onClick={()=>setTab(i)}>
              <span className="tab-icon">{t.icon}</span>{t.label}
            </button>
          ))}
        </div>

        {/* APERTURA */}
        {tab===0 && (
          <div className="section">
            <div className="section-title">Datos de Inicio del Dia</div>
            <div className="apertura-card">
              <div className="field-label" style={{marginBottom:9}}>Monto Asignado de Apertura (Bs.)</div>
              <input className="apertura-main-input" type="number" min="0" step="0.01" placeholder="0.00"
                value={apertura.montoInicial} onChange={e=>setApertura(p=>({...p,montoInicial:e.target.value}))}
                inputMode="decimal"/>
              <div style={{marginTop:6,textAlign:"center",color:"var(--muted)",fontSize:12}}>
                Total de productos/cartera asignada al distribuidor
              </div>
              <div className="apertura-fields">
                <div className="field-group">
                  <label className="field-label">Nombre del Distribuidor</label>
                  <input className="field-input" type="text" placeholder="Ej: Juan Perez"
                    value={apertura.distribuidor} onChange={e=>setApertura(p=>({...p,distribuidor:e.target.value}))}/>

                <div className="field-group">
                  <label className="field-label">Fecha</label>
                  <input className="field-input" type="date" value={apertura.fecha}

              <div className="totals-row"><span className="totals-label">Distribuidor</span><span className="totals-value" style={{fontSize:14}}>{apertura.distribuidor||"—"}</span></div>

              <div className="totals-row"><span className="totals-label">Fecha</span><span className="totals-value" style={{fontSize:14}}>{apertura.fecha}</span></div>
            </div>
          </div>

        {tab===1 && (

              {BILLETES.map(b=>{
                const qty=parseFloat(cantBilletes[b.valor])||0;
                return(<div className="denom-row" key={b.valor}>
                  <div className="denom-label"><div className="denom-dot" style={{background:b.color}}/>{b.label}</div>
                  <input className="qty-input" type="number" min="0" placeholder="0" inputMode="numeric"
                    value={cantBilletes[b.valor]} onChange={e=>setCantBilletes(p=>({...p,[b.valor]:e.target.value}))}/>
                  <div className={`denom-subtotal${qty>0?" active":""}`}>Bs. {fmt(qty*b.valor)}</div>
                </div>);
              })}
            </div>

                  <div className="denom-label"><div className="denom-dot" style={{background:m.color}}/>{m.label}</div>
                  <input className="qty-input" type="number" min="0" placeholder="0" inputMode="numeric"
                    value={cantMonedas[m.valor]} onChange={e=>setCantMonedas(p=>({...p,[m.valor]:e.target.value}))}/>

                  <button className="btn-del" onClick={()=>delGasto(g.id)}>Eliminar</button>
                </div>
                <div className="gasto-row">
                  <div className="field-group">
                    <label className="field-label">Categoria</label>
                    <select className="field-select" value={g.categoria} onChange={e=>updGasto(g.id,"categoria",e.target.value)}>

                  </div>
                  <div className="field-group">
                    <label className="field-label">Monto (Bs.)</label>
                    <input className="field-input" type="number" min="0" step="0.1" placeholder="0.00" inputMode="decimal"
                      value={g.monto} onChange={e=>updGasto(g.id,"monto",e.target.value)}
                      style={{fontFamily:"'Barlow Condensed'",fontSize:20,fontWeight:700}}/>
                  </div>
                </div>
                <div className="field-group" style={{marginTop:10}}>
                  <label className="field-label">Descripcion</label>
                  <input className="field-input" type="text" placeholder="Ej: Gasolina YPFB Av. America"
                    value={g.descripcion} onChange={e=>updGasto(g.id,"descripcion",e.target.value)}/>
                </div>
              </div>
            ))}
            <button className="btn-add" onClick={addGasto}>+ Agregar Gasto</button>
            {gastos.length>0 && (
              <div className="totals-card" style={{marginTop:16}}>
                {gastos.map(g=>(
                  <div className="totals-row" key={g.id}>
                    <span className="totals-label">{g.categoria}{g.descripcion?` — ${g.descripcion}`:""}</span>
                    <span className="totals-value" style={{color:"var(--orange)"}}>Bs. {fmt(parseFloat(g.monto)||0)}</span>
                  </div>
                ))}
                <div className="totals-row grand"><span className="totals-label" style={{color:"#e8e4dc",fontWeight:500}}>Total Gastos</span><span className="totals-value grand-val" style={{color:"var(--orange)"}}>Bs. {fmt(totalGastos)}</span></div>
              </div>
            )}
          </div>
        )}

        {/* CUADRE */}
        {tab===4 && (
          <div className="section">
            <div className="section-title">Cuadre de Caja</div>
            <div className="cuadre-apertura-banner">
              <div>
                <div className="cuadre-apertura-banner-lbl">Distribuidor</div>
                <div className="cuadre-apertura-banner-name">{apertura.distribuidor||"—"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="cuadre-apertura-banner-monto-lbl">Monto de Apertura</div>
                <div className="cuadre-apertura-banner-monto">Bs. {fmt(montoInicial)}</div>
              </div>
            </div>
            <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>Composicion de la rendicion</div>
            <div className="cuadre-tres">
              {[
                {icon:"💵",title:"Efectivo",val:totalEfectivo,color:"var(--blue)"},
                {icon:"📲",title:"Transf./QR",val:totalTransf,color:"var(--green)"},
                {icon:"🧾",title:"Gastos",val:totalGastos,color:"var(--orange)"},
              ].map((col,i)=>(
                <div className="cuadre-col" key={i}>
                  <div className="cuadre-col-header">
                    <div className="cuadre-col-icon">{col.icon}</div>
                    <div className="cuadre-col-title">{col.title}</div>
                  </div>
                  <div className="cuadre-col-body">
                    <div className="cuadre-col-val" style={{color:col.color}}>Bs. {fmt(col.val)}</div>
                    <div className="cuadre-col-pct">{pct(col.val).toFixed(1)}%</div>
                    <div className="cuadre-col-bar-track">
                      <div className="cuadre-col-bar-fill" style={{width:`${pct(col.val)}%`,background:col.color}}/>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="cuadre-suma-row">
              <span className="cuadre-suma-label">
                <span style={{color:"var(--blue)"}}>Efectivo</span> + <span style={{color:"var(--green)"}}>Transf.</span> + <span style={{color:"var(--orange)"}}>Gastos</span>
              </span>
              <span className="cuadre-suma-eq">=</span>
              <span className="cuadre-suma-val" style={{color:Math.abs(diferencia)<0.01?"var(--green)":diferencia>0?"var(--blue)":"var(--red)"}}>
                Bs. {fmt(totalRendido)}
              </span>
            </div>
            <div className={`cuadre-resultado ${cuadreClass}`}>
              <div className="cuadre-resultado-top">
                <div className="cuadre-resultado-lbl">{cuadreLabel}</div>
                <div className="cuadre-resultado-diferencia">
                  {diferencia===0?"✓":(diferencia>0?"+":"−")+"Bs. "+fmt(Math.abs(diferencia))}
                </div>
                <div className="cuadre-resultado-status">
                  {diferencia===0?"El distribuidor rindio exactamente el monto asignado":diferencia>0?`Rindio Bs. ${fmt(diferencia)} mas de lo asignado`:`Rindio Bs. ${fmt(Math.abs(diferencia))} menos de lo asignado`}
                </div>
              </div>
            </div>
            <div className="section-title">Desglose</div>
            <div className="cuadre-detalle">
              <div className="cuadre-det-row"><span className="cuadre-det-label"><span>🎯</span> Monto de Apertura</span><span className="cuadre-det-val" style={{color:"var(--gold)"}}>Bs. {fmt(montoInicial)}</span></div>
              <div className="cuadre-det-row"><span className="cuadre-det-label"><span>💵</span> Efectivo cobrado</span><span className="cuadre-det-val" style={{color:"var(--blue)"}}>Bs. {fmt(totalEfectivo)}</span></div>
              <div className="cuadre-det-row"><span className="cuadre-det-label"><span>📲</span> Transferencias / QR</span><span className="cuadre-det-val" style={{color:"var(--green)"}}>Bs. {fmt(totalTransf)}</span></div>
              <div className="cuadre-det-row"><span className="cuadre-det-label"><span>🧾</span> Gastos documentados</span><span className="cuadre-det-val" style={{color:"var(--orange)"}}>Bs. {fmt(totalGastos)}</span></div>
              <div className="cuadre-det-row" style={{background:"rgba(255,255,255,0.02)"}}><span className="cuadre-det-label"><span>Σ</span> Total rendido</span><span className="cuadre-det-val">Bs. {fmt(totalRendido)}</span></div>
              <div className="cuadre-det-row" style={{background:diferencia===0?"rgba(46,204,113,0.06)":diferencia>0?"rgba(52,152,219,0.06)":"rgba(231,76,60,0.06)"}}>
                <span className="cuadre-det-label" style={{color:diferencia===0?"var(--green)":diferencia>0?"var(--blue)":"var(--red)"}}><span>{diferencia===0?"✓":diferencia>0?"↑":"↓"}</span>{diferencia===0?" Cuadre exacto":diferencia>0?" Sobrante":" Faltante"}</span>
                <span className="cuadre-det-val" style={{fontSize:19,color:diferencia===0?"var(--green)":diferencia>0?"var(--blue)":"var(--red)"}}>{diferencia===0?"Bs. 0.00":`Bs. ${fmt(Math.abs(diferencia))}`}</span>
              </div>
            </div>
            <button className="btn-pdf" onClick={generarPDF} disabled={!jspdfLoaded||generando}>
              {generando?"⏳ Generando PDF...":jspdfLoaded?"📄 Generar Reporte PDF Completo":"⏳ Cargando..."}
            </button>
            <div style={{textAlign:"center",color:"var(--muted)",fontSize:11,marginTop:8}}>
              Incluye billetes, monedas, comprobantes, imagenes y cuadre final
            </div>

            <button className={`btn-send${envioOk?" ok":""}`} onClick={enviarArqueo} disabled={enviando||envioOk}>
              {envioOk ? "✓ Enviado a Google Sheets" : enviando ? "⏳ Enviando..." : "📊 Enviar Arqueo a Google Sheets"}
            </button>
            {envioOk && (
              <div className="send-ok-banner">
                ✓ Registro guardado correctamente en la hoja de cálculo
              </div>
            )}
            <div style={{textAlign:"center",color:"var(--muted)",fontSize:11,marginTop:8}}>
              Guarda todos los datos del arqueo en Google Sheets
            </div>
          </div>
        )}
      </div>

      <div className="resumen-bar">
        <div className="resumen-item"><span className="resumen-lbl">Apertura</span><span className="resumen-val neutral">Bs. {fmt(montoInicial)}</span></div>
        <div className="resumen-item"><span className="resumen-lbl">Efectivo</span><span className="resumen-val blue">Bs. {fmt(totalEfectivo)}</span></div>
        <div className="resumen-item"><span className="resumen-lbl">Transf.+Gas.</span><span className="resumen-val positive">Bs. {fmt(totalTransf+totalGastos)}</span></div>
        <div className="resumen-item">
          <span className="resumen-lbl">{diferencia===0?"Exacto":diferencia>0?"Sobrante":"Faltante"}</span>
          <span className={`resumen-val${diferencia===0?" positive":diferencia>0?" blue":" negative"}`}>Bs. {fmt(Math.abs(diferencia))}</span>
        </div>
      </div>
    </>
  );
}

function CompCard({comp,idx,onUpdate,onDelete,onFoto}){
  const fileRef=React.useRef(null);
  return(
    <div className="comp-card">
      <div className="comp-card-header">
        <span className="comp-badge">Comprobante #{idx+1}</span>
        <button className="btn-del" onClick={()=>onDelete(comp.id)}>Eliminar</button>
      </div>
      <div className="comp-fields">
        <div className="field-group"><label className="field-label">Tipo de pago</label>
          <select className="field-select" value={comp.tipo} onChange={e=>onUpdate(comp.id,"tipo",e.target.value)}>
            <option>QR</option><option>Transferencia</option><option>Deposito</option>
          </select>
        </div>
        <div className="field-group"><label className="field-label">Monto (Bs.)</label>
          <input className="field-input" type="number" min="0" step="0.01" placeholder="0.00" inputMode="decimal"
            value={comp.monto} onChange={e=>onUpdate(comp.id,"monto",e.target.value)}
            style={{fontFamily:"'Barlow Condensed'",fontSize:20,fontWeight:700}}/>
        </div>
        <div className="field-group"><label className="field-label">Cliente / Ruta</label>
          <input className="field-input" type="text" placeholder="Nombre del cliente"
            value={comp.cliente} onChange={e=>onUpdate(comp.id,"cliente",e.target.value)}/>
        </div>
        <div className="field-group"><label className="field-label">N° Referencia</label>
          <input className="field-input" type="text" placeholder="TRX-XXXXX"
            value={comp.referencia} onChange={e=>onUpdate(comp.id,"referencia",e.target.value)}/>
        </div>
      </div>
      <div className="field-label" style={{marginBottom:6}}>Fotografia del comprobante</div>
      <div className={`photo-zone${comp.foto?" has-photo":""}`} onClick={()=>fileRef.current?.click()}>
        {comp.foto?(<><img src={comp.foto} alt="Comprobante"/><div style={{marginTop:5,fontSize:11,color:"var(--muted)"}}>Toca para cambiar la foto</div></>):
        (<div className="photo-zone-placeholder"><span>📷</span>Toca para adjuntar foto del comprobante</div>)}
        <input ref={fileRef} type="file" accept="image/*" capture="environment"
          className="photo-input" onChange={e=>onFoto(comp.id,e.target.files[0])}/>
      </div>
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Arqueo />);
</script>

<script>
// ── Service Worker ──────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const reg = await navigator.serviceWorker.register("/sw.js");
      console.log("SW registrado:", reg.scope);

      // Detectar nueva version
      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            document.getElementById("update-banner").classList.add("show");
          }
        });
      });
    } catch (e) {
      console.warn("SW no pudo registrarse:", e);
    }
  });

  // Recargar al activar nuevo SW
  navigator.serviceWorker.addEventListener("controllerchange", () => location.reload());
}

document.getElementById("update-btn").addEventListener("click", () => {
  navigator.serviceWorker.ready.then(reg => {
    if (reg.waiting) reg.waiting.postMessage("skipWaiting");
  });
});

// ── Banner instalacion ───────────────────────────────────────────────────────
let deferredPrompt = null;
const banner       = document.getElementById("install-banner");
const installBtn   = document.getElementById("install-btn");
const dismissBtn   = document.getElementById("install-dismiss");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => banner.classList.add("show"), 3000);
});

installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  console.log("Instalacion:", outcome);
  deferredPrompt = null;
  banner.classList.remove("show");
});

dismissBtn.addEventListener("click", () => banner.classList.remove("show"));

window.addEventListener("appinstalled", () => {
  banner.classList.remove("show");
  console.log("App instalada correctamente.");
});

// ── Ocultar splash ───────────────────────────────────────────────────────────
// Ocultar splash tras 2.5s sin importar si los scripts terminaron
setTimeout(() => {
  const splash = document.getElementById("splash");
  if (splash) { splash.classList.add("hidden"); setTimeout(() => { if(splash.parentNode) splash.remove(); }, 500); }
}, 2500);
// Fallback: si carga antes, ocultarlo al cargar
window.addEventListener("load", () => {
  setTimeout(() => {
    const splash = document.getElementById("splash");
    if (splash) { splash.classList.add("hidden"); setTimeout(() => { if(splash.parentNode) splash.remove(); }, 500); }
  }, 800);
});
</script>
</body>
</html>
